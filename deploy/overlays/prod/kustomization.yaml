apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: portal-prod

namespace: opl-prod

resources:
  - ../../base

labels:
  - pairs:
      app.kubernetes.io/environment: prod
    includeSelectors: false

patches:
  - path: deployment-patch.yaml
  - path: configmap-patch.yaml
  - path: route-patch.yaml

images:
  - name: portal
    newName: quay.io/opdev/portal
    newTag: latest
