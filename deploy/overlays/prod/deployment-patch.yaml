apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: portal
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: portal
