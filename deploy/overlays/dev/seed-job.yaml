# One-shot Job to seed staging database with synthetic data
# Run after migrations to populate test data for smoke tests
apiVersion: batch/v1
kind: Job
metadata:
  name: portal-seed
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/component: seed
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal
        app.kubernetes.io/component: seed
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed
          image: quay.io/rhopl/portal:latest
          command:
            - node
            - prisma/seed.postgresql.mjs
          envFrom:
            - secretRef:
                name: portal-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
