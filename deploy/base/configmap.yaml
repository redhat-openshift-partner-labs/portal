apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-config
  labels:
    app: portal
    app.kubernetes.io/name: portal
data:
  # Public site URL (set via overlay or patch)
  NUXT_PUBLIC_SITE_URL: "https://portal.apps.example.com"
  APP_URL: "https://portal.apps.example.com"
  # Mapbox token (optional, leave empty if not used)
  NUXT_PUBLIC_MAPBOX_TOKEN: ""
