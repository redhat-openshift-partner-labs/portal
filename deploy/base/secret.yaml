apiVersion: v1
kind: Secret
metadata:
  name: portal-secrets
  labels:
    app: portal
    app.kubernetes.io/name: portal
type: Opaque
stringData:
  # PostgreSQL connection string
  # Example: postgresql://user:password@db-host:5432/dbname?schema=public
  DATABASE_URL: "portalstore-pgbouncer.openshift-operators.svc.cluster.local"
  # Google OAuth credentials
  GOOGLE_CLIENT_ID: "client_id"
  GOOGLE_CLIENT_SECRET: "client_secret"
  # JWT signing secret (generate with: openssl rand -base64 32)
  AUTH_SECRET: "REPLACE_WITH_AUTH_SECRET"
