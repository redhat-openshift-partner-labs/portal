# ServiceAccount and RBAC for GitHub Actions CI/CD
#
# Two service accounts with least-privilege access:
#   github-actions-staging  → staging namespace  (used by Deploy: Staging)
#   github-actions-portal   → portal namespace   (used by Deploy: Production)
#
# Apply:
#   oc apply -f deploy/ci/service-account.yaml
#
# Generate tokens (3-month expiry):
#   oc create token github-actions-staging -n staging --duration=2190h
#   oc create token github-actions-portal  -n portal  --duration=2190h

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-staging
  namespace: staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-portal
  namespace: portal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: github-actions-deploy
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-staging
  namespace: staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: github-actions-deploy
subjects:
  - kind: ServiceAccount
    name: github-actions-staging
    namespace: staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-portal
  namespace: portal
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: github-actions-deploy
subjects:
  - kind: ServiceAccount
    name: github-actions-portal
    namespace: portal
