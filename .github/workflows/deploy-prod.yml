name: "Deploy: Production"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag to deploy (e.g., 1.0.0)'
        required: true
        type: string
  workflow_run:
    workflows: ["Deploy: Staging"]
    types: [completed]

env:
  OVERLAY: deploy/overlays/prod
  NAMESPACE: portal

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/oc-installer@v1

      - name: Login to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN_PORTAL }}
          insecure_skip_tls_verify: true
          namespace: ${{ env.NAMESPACE }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Strip v prefix for semver compliance
            INPUT_VERSION="${{ inputs.version }}"
            echo "version=${INPUT_VERSION#v}" >> $GITHUB_OUTPUT
          else
            # Use head_sha from the staging workflow run to anchor tag resolution to the
            # exact commit, not HEAD on main. referenced_workflows[0].run_id is only
            # populated for reusable workflows (uses:) and must not be used here.
            SHA=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }} --jq '.head_sha')
            TAG=$(git tag --points-at "$SHA" | head -1)
            if [ -z "$TAG" ]; then
              TAG=$(git describe --tags "$SHA" --abbrev=0 2>/dev/null || echo "")
            fi

            if [[ "$TAG" =~ ^v[0-9] ]]; then
              VERSION="${TAG#v}"
            else
              VERSION=$(echo "$SHA" | head -c 7)
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi
          echo "Deploying version: ${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update image tag and set replicas to 0
        run: |
          cd ${{ env.OVERLAY }}
          kustomize edit set image portal=quay.io/rhopl/portal:${{ steps.version.outputs.version }}
          kustomize edit set replicas portal=0

      - name: Create image pull secret
        run: |
          oc create secret docker-registry quay-pull-secret \
            --docker-server=quay.io \
            --docker-username="${{ secrets.QUAY_USERNAME }}" \
            --docker-password="${{ secrets.QUAY_PASSWORD }}" \
            -n ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | oc apply -f -

      - name: Deploy to OpenShift (paused)
        run: |
          oc apply -k ${{ env.OVERLAY }}

      - name: Configure application secrets
        run: |
          # Create or update portal-secrets (NUXT_ prefix for runtime override)
          oc create secret generic portal-secrets -n ${{ env.NAMESPACE }} \
            --from-literal=DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}" \
            --from-literal=NUXT_OAUTH_CLIENT_SECRET="${{ secrets.PROD_OAUTH_CLIENT_SECRET }}" \
            --from-literal=NUXT_OAUTH_TOKEN_URL="${{ secrets.PROD_OAUTH_TOKEN_URL }}" \
            --from-literal=NUXT_AUTH_SECRET="${{ secrets.PROD_AUTH_SECRET }}" \
            --dry-run=client -o yaml | oc apply -f -

      - name: Configure route and app URLs
        run: |
          # Patch route hostname and TLS certificate
          oc patch route portal -n ${{ env.NAMESPACE }} \
            --type=merge \
            --patch-file=/dev/stdin <<EOF
          {
            "spec": {
              "host": "${{ secrets.PROD_URL }}",
              "tls": {
                "termination": "edge",
                "certificate": $(echo "$ROUTE_CERT" | jq -Rs .),
                "key": $(echo "$ROUTE_KEY" | jq -Rs .)
              }
            }
          }
          EOF
        env:
          ROUTE_CERT: ${{ secrets.PROD_ROUTE_SSL_CERTIFICATE }}
          ROUTE_KEY: ${{ secrets.PROD_ROUTE_SSL_KEY }}

      - name: Configure app URLs
        run: |
          # Patch configmap with site URLs (NUXT_PUBLIC_* for runtime override)
          oc patch configmap portal-config -n ${{ env.NAMESPACE }} \
            --type=merge -p '{
              "data": {
                "NUXT_PUBLIC_SITE_URL": "https://${{ secrets.PROD_URL }}",
                "NUXT_PUBLIC_APP_URL": "https://${{ secrets.PROD_URL }}",
                "NUXT_PUBLIC_OAUTH_CLIENT_ID": "${{ secrets.PROD_OAUTH_CLIENT_ID }}",
                "NUXT_PUBLIC_OAUTH_AUTH_URL": "${{ secrets.PROD_OAUTH_AUTH_URL }}"
              }
            }'

      - name: Scale up deployment
        run: |
          oc scale deployment/portal -n ${{ env.NAMESPACE }} --replicas=1
          oc rollout status deployment/portal -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Run database migrations
        run: |
          # Run migrations from the deployed pod
          POD=$(oc get pod -l app=portal -n ${{ env.NAMESPACE }} -o jsonpath='{.items[0].metadata.name}')
          oc exec -n ${{ env.NAMESPACE }} "$POD" -- node ./node_modules/prisma/build/index.js migrate deploy --config=prisma.config.postgresql.ts

      - name: Verify deployment
        run: |
          curl --fail --retry 5 --retry-delay 10 "https://${{ secrets.PROD_URL }}/api/health"

      - name: Report status
        if: always()
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${{ secrets.PROD_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
