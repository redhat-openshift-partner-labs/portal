name: Deploy Staging

on:
  workflow_run:
    workflows: [Build Image]
    types: [completed]

env:
  OVERLAY: deploy/overlays/dev

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/oc-installer@v1

      - name: Log in to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true

      - name: Extract version from release
        id: version
        run: |
          VERSION=$(echo "${{ github.event.workflow_run.head_branch }}" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update image tag
        run: |
          cd ${{ env.OVERLAY }}
          kustomize edit set image portal=quay.io/rhopl/portal:${{ steps.version.outputs.version }}

      - name: Deploy to OpenShift
        run: |
          oc apply -k ${{ env.OVERLAY }}
          oc rollout status deployment/portal -n staging --timeout=300s

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/oc-installer@v1

      - name: Log in to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true

      - name: Get route URL
        id: route
        run: |
          URL=$(oc get route portal -n staging -o jsonpath='{.spec.host}')
          echo "url=https://$URL" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 10 "${{ steps.route.outputs.url }}/api/health"

      - name: Report status
        if: always()
        run: |
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.route.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
