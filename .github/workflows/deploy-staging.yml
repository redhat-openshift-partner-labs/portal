name: Deploy Staging

on:
  workflow_run:
    workflows: [Build Image]
    types: [completed]

permissions:
  id-token: write  # Required for OIDC
  contents: read

env:
  OVERLAY: deploy/overlays/dev
  NAMESPACE: staging

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/oc-installer@v1

      - name: Detect auth method
        id: auth
        run: |
          if [ -n "${{ secrets.KEYCLOAK_URL }}" ]; then
            echo "method=oidc" >> $GITHUB_OUTPUT
          else
            echo "method=token" >> $GITHUB_OUTPUT
          fi

      # Token-based authentication
      - name: Login with token
        if: steps.auth.outputs.method == 'token'
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ env.NAMESPACE }}

      # OIDC authentication via Keycloak
      - name: Get GitHub OIDC token
        if: steps.auth.outputs.method == 'oidc'
        id: github-oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('keycloak');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Exchange token via Keycloak
        if: steps.auth.outputs.method == 'oidc'
        id: keycloak
        run: |
          RESPONSE=$(curl -s -X POST \
            "${{ secrets.KEYCLOAK_URL }}/realms/${{ secrets.KEYCLOAK_REALM }}/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            -d "client_id=${{ secrets.KEYCLOAK_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.KEYCLOAK_CLIENT_SECRET }}" \
            -d "subject_token=${{ steps.github-oidc.outputs.token }}" \
            -d "subject_token_type=urn:ietf:params:oauth:token-type:jwt" \
            -d "requested_token_type=urn:ietf:params:oauth:token-type:access_token")
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "::error::Token exchange failed"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Login with Keycloak token
        if: steps.auth.outputs.method == 'oidc'
        run: |
          oc login "${{ secrets.OPENSHIFT_SERVER }}" \
            --token="${{ steps.keycloak.outputs.token }}" \
            --insecure-skip-tls-verify=true
          oc project ${{ env.NAMESPACE }}

      - name: Extract version from release
        id: version
        run: |
          VERSION=$(echo "${{ github.event.workflow_run.head_branch }}" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update image tag
        run: |
          cd ${{ env.OVERLAY }}
          kustomize edit set image portal=quay.io/rhopl/portal:${{ steps.version.outputs.version }}

      - name: Deploy to OpenShift
        run: |
          oc apply -k ${{ env.OVERLAY }}
          oc rollout status deployment/portal -n ${{ env.NAMESPACE }} --timeout=300s

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/oc-installer@v1

      - name: Login to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true

      - name: Get route URL
        id: route
        run: |
          URL=$(oc get route portal -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.host}')
          echo "url=https://$URL" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 10 "${{ steps.route.outputs.url }}/api/health"

      - name: Report status
        if: always()
        run: |
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.route.outputs.url }}" >> $GITHUB_STEP_SUMMARY
