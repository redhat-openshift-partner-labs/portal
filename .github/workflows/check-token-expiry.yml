name: Check Token Expiry

on:
  schedule:
    # Run monthly on the 1st at 9am UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  check:
    name: Check OpenShift Token Expiry
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: staging
            expiry_secret: OPENSHIFT_TOKEN_STAGING_EXPIRY
          - name: portal
            expiry_secret: OPENSHIFT_TOKEN_PORTAL_EXPIRY
    steps:
      - name: Check expiry date (${{ matrix.name }})
        id: check
        env:
          EXPIRY_DATE: ${{ secrets[matrix.expiry_secret] }}
          SA_NAME: github-actions-${{ matrix.name }}
        run: |
          if [ -z "$EXPIRY_DATE" ]; then
            echo "::warning::${{ matrix.expiry_secret }} secret not set"
            echo "expired=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi

          expiry_ts=$(date -d "$EXPIRY_DATE" +%s)
          now_ts=$(date +%s)
          days_left=$(( (expiry_ts - now_ts) / 86400 ))

          echo "days_left=$days_left" >> $GITHUB_OUTPUT
          echo "expiry_date=$EXPIRY_DATE" >> $GITHUB_OUTPUT

          if [ $days_left -lt 0 ]; then
            echo "expired=yes" >> $GITHUB_OUTPUT
          elif [ $days_left -lt 30 ]; then
            echo "expired=soon" >> $GITHUB_OUTPUT
          else
            echo "expired=no" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if expiring soon (${{ matrix.name }})
        if: steps.check.outputs.expired == 'soon' || steps.check.outputs.expired == 'yes'
        uses: actions/github-script@v7
        with:
          script: |
            const saName = 'github-actions-${{ matrix.name }}';
            const namespace = '${{ matrix.name }}';
            const tokenSecret = 'OPENSHIFT_TOKEN_${{ matrix.name }}'.toUpperCase();
            const expirySecret = '${{ matrix.expiry_secret }}';
            const expired = '${{ steps.check.outputs.expired }}';
            const daysLeft = parseInt('${{ steps.check.outputs.days_left }}');
            const expiryDate = '${{ steps.check.outputs.expiry_date }}';

            const title = expired === 'yes'
              ? `🚨 OpenShift token has EXPIRED (${namespace})`
              : `⚠️ OpenShift token expires in ${daysLeft} days (${namespace})`;

            const body = `## OpenShift Token Expiry Alert

            **Service Account**: \`${saName}\` in namespace \`${namespace}\`
            **Status**: ${expired === 'yes' ? 'EXPIRED' : 'Expiring Soon'}
            **Expiry Date**: ${expiryDate}
            **Days Remaining**: ${daysLeft}

            ### Action Required

            1. Generate a new token:
               \`\`\`bash
               oc create token ${saName} -n ${namespace} --duration=2190h
               \`\`\`

            2. Update GitHub Secret \`${tokenSecret}\` with the new token

            3. Update GitHub Secret \`${expirySecret}\` with the new expiry date

            ---
            *This issue was automatically created by the token expiry check workflow.*`;

            const label = `token-expiry-${namespace}`;

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label, 'ops']
              });
            }

      - name: Summary (${{ matrix.name }})
        run: |
          echo "## Token Expiry Check: ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Service Account**: github-actions-${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.check.outputs.expired }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Expiry Date**: ${{ steps.check.outputs.expiry_date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Days Remaining**: ${{ steps.check.outputs.days_left }}" >> $GITHUB_STEP_SUMMARY
