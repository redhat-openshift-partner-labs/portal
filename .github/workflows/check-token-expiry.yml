name: Check Token Expiry

on:
  schedule:
    # Run monthly on the 1st at 9am UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  check:
    name: Check OpenShift Token Expiry
    runs-on: ubuntu-latest
    steps:
      - name: Check expiry date
        id: check
        env:
          EXPIRY_DATE: ${{ secrets.OPENSHIFT_TOKEN_EXPIRY }}
        run: |
          if [ -z "$EXPIRY_DATE" ]; then
            echo "::warning::OPENSHIFT_TOKEN_EXPIRY secret not set"
            echo "expired=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi

          expiry_ts=$(date -d "$EXPIRY_DATE" +%s)
          now_ts=$(date +%s)
          days_left=$(( (expiry_ts - now_ts) / 86400 ))

          echo "days_left=$days_left" >> $GITHUB_OUTPUT
          echo "expiry_date=$EXPIRY_DATE" >> $GITHUB_OUTPUT

          if [ $days_left -lt 0 ]; then
            echo "expired=yes" >> $GITHUB_OUTPUT
          elif [ $days_left -lt 30 ]; then
            echo "expired=soon" >> $GITHUB_OUTPUT
          else
            echo "expired=no" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if expiring soon
        if: steps.check.outputs.expired == 'soon' || steps.check.outputs.expired == 'yes'
        uses: actions/github-script@v7
        with:
          script: |
            const expired = '${{ steps.check.outputs.expired }}';
            const daysLeft = parseInt('${{ steps.check.outputs.days_left }}');
            const expiryDate = '${{ steps.check.outputs.expiry_date }}';

            const title = expired === 'yes'
              ? '🚨 OpenShift token has EXPIRED'
              : `⚠️ OpenShift token expires in ${daysLeft} days`;

            const body = `## OpenShift Token Expiry Alert

            **Status**: ${expired === 'yes' ? 'EXPIRED' : 'Expiring Soon'}
            **Expiry Date**: ${expiryDate}
            **Days Remaining**: ${daysLeft}

            ### Action Required

            1. Generate a new token:
               \`\`\`bash
               oc create token github-actions -n staging --duration=8760h
               \`\`\`

            2. Update GitHub Secret \`OPENSHIFT_TOKEN\` with the new token

            3. Update GitHub Secret \`OPENSHIFT_TOKEN_EXPIRY\` with the new expiry date (1 year from now)

            ---
            *This issue was automatically created by the token expiry check workflow.*`;

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'token-expiry'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['token-expiry', 'ops']
              });
            }

      - name: Summary
        run: |
          echo "## Token Expiry Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.check.outputs.expired }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Expiry Date**: ${{ steps.check.outputs.expiry_date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Days Remaining**: ${{ steps.check.outputs.days_left }}" >> $GITHUB_STEP_SUMMARY
